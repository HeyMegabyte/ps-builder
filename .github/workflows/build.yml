name: Build and Push
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Build the image locally
      - name: Build Docker image
        run: docker build -t ps-builder:latest .

      # Push to GHCR as backup
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GHCR
        run: |
          docker tag ps-builder:latest ghcr.io/heymegabyte/ps-builder:latest
          docker push ghcr.io/heymegabyte/ps-builder:latest

      # Also push to Docker Hub (for CF Containers)
      - uses: docker/login-action@v3
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        run: |
          docker tag ps-builder:latest ${{ secrets.DOCKERHUB_USERNAME }}/ps-builder:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ps-builder:latest
