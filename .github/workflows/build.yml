name: Build and Push
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u professormanhattan --password-stdin
      - name: Build and push
        run: |
          docker build -t ps-builder .
          docker tag ps-builder ghcr.io/heymegabyte/ps-builder:v2
          docker push ghcr.io/heymegabyte/ps-builder:v2
          docker tag ps-builder professormanhattan/ps-builder:v2
          docker push professormanhattan/ps-builder:v2
