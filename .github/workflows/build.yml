name: Build and Push
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        run: |
          docker build -t ps-builder:latest .
          docker tag ps-builder:latest ghcr.io/heymegabyte/ps-builder:latest
          docker push ghcr.io/heymegabyte/ps-builder:latest
          docker tag ps-builder:latest ${{ secrets.DOCKERHUB_USERNAME }}/ps-builder:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ps-builder:latest
